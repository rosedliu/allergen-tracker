<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Allergen Tracker</title>
  <style>
    :root {
      --safe: #22c55e;
      --safe-light: #dcfce7;
      --unsafe: #f59e0b;
      --unsafe-light: #fef3c7;
      --never: #ef4444;
      --never-light: #fee2e2;
      --unknown: #94a3b8;
      --unknown-light: #f1f5f9;
      --bg: #f8fafc;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --accent: #6366f1;
      --accent-light: #eef2ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 60px;
    }

    /* ── Header ── */
    .header {
      background: white;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header .date { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .refresh-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
    }

    /* ── Error / Loading banners ── */
    .banner {
      margin: 12px 16px 0;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
    }
    .banner.error   { background: var(--never-light); color: #dc2626; }
    .banner.loading { background: var(--unknown-light); color: var(--text-muted); }

    /* ── Section wrapper ── */
    .section { padding: 16px 16px 0; }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    /* ── Card ── */
    .card {
      background: white;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 12px;
    }

    /* ── Sub-label inside section ── */
    .sub-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 6px;
      margin-top: 4px;
    }

    /* ── Allergen row ── */
    .allergen-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      min-height: 52px;
    }
    .allergen-row:last-child { border-bottom: none; }
    .allergen-row:active { background: var(--bg); }
    .allergen-row.in-progress { border-left: 3px solid var(--accent); padding-left: 11px; }

    .row-icon { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
    .row-body { flex: 1; min-width: 0; }
    .row-name { font-size: 14px; font-weight: 600; }
    .row-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    .dots { display: flex; gap: 4px; margin-top: 4px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot.filled { background: var(--safe); }
    .dot.empty  { background: var(--border); }

    .row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .badge.safe    { background: var(--safe-light);    color: #15803d; }
    .badge.unsafe  { background: var(--unsafe-light);  color: #b45309; }
    .badge.never   { background: var(--never-light);   color: #dc2626; }
    .badge.unknown { background: var(--unknown-light);  color: #475569; }

    .next-chip {
      font-size: 10px;
      background: var(--accent-light);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 5px;
      font-weight: 500;
    }

    /* ── Schedule ── */
    .cal-scroll-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: white;
      margin-bottom: 10px;
    }
    .calendar { min-width: 500px; }

    .cal-header {
      display: grid;
      grid-template-columns: 32px repeat(7, 1fr);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .cal-day {
      padding: 7px 2px;
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .cal-day .num { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin-top: 1px; }

    .cal-row {
      display: grid;
      grid-template-columns: 32px repeat(7, 1fr);
      border-bottom: 1px solid var(--border);
    }
    .cal-row:last-child { border-bottom: none; }

    .cal-slot {
      font-size: 9px; font-weight: 700; color: var(--text-muted);
      text-align: center; display: flex; align-items: center; justify-content: center;
      background: var(--bg); border-right: 1px solid var(--border); letter-spacing: 0.05em;
    }
    .cal-cell {
      padding: 5px 3px; min-height: 52px; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    }
    .cal-cell:last-child { border-right: none; }

    .cal-food {
      font-size: 10px; font-weight: 500; color: var(--text);
      text-align: center; line-height: 1.2; white-space: nowrap;
    }
    .cal-food.test {
      background: var(--never-light); color: #dc2626;
      font-weight: 700; border-radius: 4px; padding: 1px 4px; cursor: pointer;
    }

    .cal-legend {
      font-size: 11px; color: var(--text-muted); line-height: 1.7;
      padding: 10px 14px; background: white;
      border-radius: 10px; border: 1px solid var(--border); margin-bottom: 12px;
    }

    /* ── Other foods ── */
    .cat-label {
      font-size: 12px; font-weight: 700;
      padding: 9px 14px; background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between;
    }
    .cat-count { font-weight: 400; color: var(--text-muted); font-size: 11px; }

    .food-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; gap: 8px;
    }
    .food-row:last-child { border-bottom: none; }
    .food-row:active { background: var(--bg); }
    .food-name { font-size: 13px; font-weight: 500; }
    .food-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    .add-food-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; cursor: pointer;
      color: var(--accent); font-size: 13px; font-weight: 600;
      border-top: 1px solid var(--border);
    }
    .add-food-row:active { background: var(--bg); }

    /* ── Modals ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 200;
      display: flex; align-items: flex-end;
    }
    .sheet {
      background: white; border-radius: 20px 20px 0 0;
      padding: 16px 20px 48px; width: 100%;
    }
    .sheet-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 auto 16px;
    }
    .sheet-title { font-size: 18px; font-weight: 700; }
    .sheet-sub   { font-size: 13px; color: var(--text-muted); margin-top: 3px; margin-bottom: 18px; }

    .log-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .log-row input[type="checkbox"] {
      width: 20px; height: 20px; accent-color: var(--accent); flex-shrink: 0;
    }
    .log-row label { font-size: 14px; font-weight: 500; cursor: pointer; }

    .submit-btn {
      width: 100%; padding: 14px; background: var(--accent); color: white;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 16px;
    }
    .submit-btn:disabled { opacity: 0.6; cursor: default; }

    .reaction-toggle {
      text-align: center; margin-top: 12px; font-size: 13px;
      color: var(--text-muted); cursor: pointer;
      text-decoration: underline; text-decoration-style: dotted;
    }
    .reaction-panel {
      margin-top: 14px; padding: 14px;
      background: var(--never-light); border-radius: 10px; border: 1px solid #fecaca;
    }
    .reaction-panel-title {
      font-size: 12px; font-weight: 700; color: #dc2626;
      margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .reaction-options { display: flex; gap: 8px; }
    .reaction-btn {
      flex: 1; padding: 10px 6px; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; border: none;
    }
    .reaction-btn.mild   { background: var(--unsafe-light); color: #b45309; border: 1px solid #fcd34d; }
    .reaction-btn.severe { background: var(--never-light);  color: #dc2626; border: 1px solid #fca5a5; }
    .reaction-desc { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 4px; }

    /* Add food extras */
    .field-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px; margin-top: 14px;
    }
    .text-input {
      width: 100%; padding: 11px 12px; border: 1px solid var(--border);
      border-radius: 10px; font-size: 15px; font-family: inherit; outline: none;
    }
    .text-input:focus { border-color: var(--accent); }
    .cat-preview { font-size: 12px; color: var(--text-muted); margin-top: 6px; min-height: 18px; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>🍼 Allergen Tracker</h1>
    <div class="date" id="today-label"></div>
  </div>
  <button class="refresh-btn" onclick="loadAndRender()" title="Refresh">↻</button>
</div>

<div id="status-banner"></div>

<!-- Major Allergens -->
<div class="section" style="padding-top:18px;">
  <div class="section-label">Major Allergens</div>
  <div id="section-major"><div class="banner loading">Loading…</div></div>
</div>

<!-- Schedule -->
<div class="section" style="padding-top:6px;">
  <div id="section-schedule"><div class="banner loading">Loading…</div></div>
</div>

<!-- Other Foods -->
<div class="section" style="padding-top:6px;">
  <div class="section-label">Other Foods</div>
  <div id="section-other"><div class="banner loading">Loading…</div></div>
</div>

<!-- ── Log Modal ── -->
<div class="overlay" id="log-overlay" style="display:none;" onclick="handleLogOverlay(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="log-title"></div>
    <div class="sheet-sub"   id="log-sub"></div>

    <div class="log-row">
      <input type="checkbox" id="log-check" checked>
      <label for="log-check">Mark as fed today</label>
    </div>

    <button class="submit-btn" id="log-submit-btn" onclick="submitLog()">Log Feeding</button>

    <div class="reaction-toggle" id="reaction-toggle" onclick="toggleReaction()">Report a reaction</div>

    <div class="reaction-panel" id="reaction-panel" style="display:none;">
      <div class="reaction-panel-title">⚠ What kind of reaction?</div>
      <div class="reaction-options">
        <div>
          <button class="reaction-btn mild" onclick="submitReaction('mild')">⚠ Mild</button>
          <div class="reaction-desc">Mark Unsafe</div>
        </div>
        <div>
          <button class="reaction-btn severe" onclick="submitReaction('severe')">✗ Severe</button>
          <div class="reaction-desc">Mark Never</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Add Food Modal ── -->
<div class="overlay" id="add-overlay" style="display:none;" onclick="handleAddOverlay(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Add Food</div>
    <div class="sheet-sub">New foods start as UNKNOWN</div>

    <div class="field-label">Food name</div>
    <input class="text-input" id="new-food-name" type="text" placeholder="e.g. Blueberry"
           autocomplete="off" oninput="previewCategory()">
    <div class="cat-preview" id="cat-preview"></div>

    <button class="submit-btn" onclick="submitNewFood()">Add Food</button>
  </div>
</div>

<!-- ── Scripts ── -->
<script src="js/classifier.js"></script>
<script src="js/scheduler.js"></script>
<script src="js/api.js"></script>
<script src="js/render-major.js"></script>
<script src="js/render-schedule.js"></script>
<script src="js/render-other.js"></script>
<script src="js/app.js"></script>

<script>
  // ── State ──────────────────────────────────────────────────────────────
  let _state = { major: [], otherFoods: [] };
  let _schedule = {};
  let _currentLog = null; // { name, isMajor, prevStatus }

  // ── Init ───────────────────────────────────────────────────────────────
  document.getElementById('today-label').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });

  loadAndRender();

  async function loadAndRender() {
    setBanner('loading', 'Loading…');
    try {
      _state = await fetchAll();
      _schedule = buildSchedule({ major: _state.major, today: new Date() });
      renderAll();
      clearBanner();
    } catch (err) {
      console.error('Failed to load data:', err);
      setBanner('error', 'Could not load data. Check your connection and refresh.');
    }
  }

  function renderAll() {
    renderMajorAllergens(_state.major, _schedule, openLog);
    renderSchedule(_schedule, openLog);
    renderOtherFoods(_state.otherFoods, openLog, openAddFood);
  }

  // ── Log modal ──────────────────────────────────────────────────────────
  function openLog(name, sub, status) {
    const isMajor = _state.major.some(f => f.name === name);
    _currentLog = { name, isMajor, prevStatus: status };

    document.getElementById('log-title').textContent = name;
    document.getElementById('log-sub').textContent = sub + ' · ' + new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    document.getElementById('log-check').checked = true;
    document.getElementById('reaction-panel').style.display = 'none';
    document.getElementById('reaction-toggle').textContent = 'Report a reaction';
    document.getElementById('log-submit-btn').disabled = false;
    document.getElementById('log-overlay').style.display = 'flex';
  }

  function handleLogOverlay(e) {
    if (e.target === document.getElementById('log-overlay')) closeLog();
  }

  function closeLog() {
    document.getElementById('log-overlay').style.display = 'none';
    _currentLog = null;
  }

  function toggleReaction() {
    const panel = document.getElementById('reaction-panel');
    const isHidden = panel.style.display === 'none';
    panel.style.display = isHidden ? 'block' : 'none';
    document.getElementById('reaction-toggle').textContent = isHidden ? 'Hide' : 'Report a reaction';
  }

  async function submitLog() {
    if (!_currentLog) return;
    const btn = document.getElementById('log-submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      await postAction({
        action:     'log_feeding',
        food:       _currentLog.name,
        isMajor:    _currentLog.isMajor,
        reaction:   'none',
        caretaker:  getCaretaker(),
        prevStatus: _currentLog.prevStatus,
      });
      closeLog();
      await loadAndRender();
    } catch (err) {
      console.error('Log failed:', err);
      setBanner('error', 'Save failed. Try again.');
      btn.disabled = false;
      btn.textContent = 'Log Feeding';
    }
  }

  async function submitReaction(level) {
    if (!_currentLog) return;
    try {
      await postAction({
        action:     'log_feeding',
        food:       _currentLog.name,
        isMajor:    _currentLog.isMajor,
        reaction:   level,
        caretaker:  getCaretaker(),
        prevStatus: _currentLog.prevStatus,
      });
      closeLog();
      await loadAndRender();
    } catch (err) {
      console.error('Reaction log failed:', err);
      setBanner('error', 'Save failed. Try again.');
    }
  }

  // ── Add food modal ─────────────────────────────────────────────────────
  function openAddFood() {
    document.getElementById('new-food-name').value = '';
    document.getElementById('cat-preview').textContent = '';
    document.getElementById('add-overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('new-food-name').focus(), 100);
  }

  function handleAddOverlay(e) {
    if (e.target === document.getElementById('add-overlay')) {
      document.getElementById('add-overlay').style.display = 'none';
    }
  }

  function previewCategory() {
    const name = document.getElementById('new-food-name').value.trim();
    const el   = document.getElementById('cat-preview');
    el.textContent = name ? '→ Will be added to ' + classifyFood(name) : '';
  }

  async function submitNewFood() {
    const name = document.getElementById('new-food-name').value.trim();
    if (!name) { document.getElementById('new-food-name').focus(); return; }
    const category = classifyFood(name);
    try {
      await postAction({
        action:    'add_food',
        food:      name,
        category:  category,
        isMajor:   false,
        caretaker: getCaretaker(),
      });
      document.getElementById('add-overlay').style.display = 'none';
      await loadAndRender();
    } catch (err) {
      console.error('Add food failed:', err);
      setBanner('error', 'Could not add food. Try again.');
    }
  }

  // ── Banner helpers ─────────────────────────────────────────────────────
  function setBanner(type, msg) {
    const el = document.getElementById('status-banner');
    el.innerHTML = `<div class="banner ${type}">${msg}</div>`;
  }

  function clearBanner() {
    document.getElementById('status-banner').innerHTML = '';
  }
</script>

</body>
</html>
